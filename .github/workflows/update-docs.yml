name: Update Docs

on:
    pull_request:
        types:
            - closed
        branches:
            - main

permissions:
    contents: write
    pull-requests: read

jobs:
    update-readme:
        if: github.event.pull_request.merged == true
        runs-on: ubuntu-latest

        steps:
            - { name: Checkout main, uses: actions/checkout@v4, with: { ref: main } }

            - { name: Setup Node.js, uses: actions/setup-node@v4, with: { node-version: '20', cache: npm } }

            - { name: Install dependencies, run: npm ci }

            - name: Update README with latest merged PR context
              env:
                OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                GITHUB_REPOSITORY: ${{ github.repository }}
              run: npm run docs:update

            - name: Commit README changes
              run: |
                if git diff --quiet README.md; then
                  echo "No README changes to commit"
                  exit 0
                fi

                git config user.name "github-actions[bot]"
                git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                git add README.md
                git commit -m "docs: update README after merged PR"
                git push origin HEAD:main